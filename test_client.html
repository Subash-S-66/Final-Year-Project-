<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ISL ONNX WS Test Client</title>
  <style>
    body { font-family: system-ui, Segoe UI, Arial, sans-serif; margin: 16px; }
    .row { display: flex; gap: 16px; align-items: start; flex-wrap: wrap; }
    video, canvas { width: 480px; max-width: 100%; border: 1px solid #ddd; border-radius: 8px; }
    pre { background: #0b1020; color: #e6edf3; padding: 12px; border-radius: 8px; overflow: auto; max-width: 720px; }
    button { padding: 8px 12px; }
    .kv { display: grid; grid-template-columns: 140px 1fr; gap: 6px 12px; margin: 12px 0; }
    .muted { color: #555; }
  </style>
</head>
<body>
  <h2>Real-time ISL → Text (ONNXRuntime) </h2>
  <div class="muted">Sends JPEG frames to <code>ws://localhost:8000/ws</code> and prints token + confidence.</div>

  <div style="margin: 12px 0;">
    <label>
      WS URL:
      <input id="wsUrl" style="width: 360px" value="ws://localhost:8000/ws" />
    </label>
  </div>
  <div style="margin: 12px 0;">
    <label>Video file:
      <input id="videoFile" type="file" accept="video/*" />
    </label>
    <label style="margin-left: 12px;">
      Sample FPS:
      <input id="uploadFps" type="number" min="1" max="30" value="15" style="width: 70px;" />
    </label>
    <button id="btnUpload">Upload Test</button>
  </div>

  <div style="margin: 12px 0;">
    <button id="btnStart">Start</button>
    <button id="btnStop" disabled>Stop</button>
    <label style="margin-left: 12px;">
      <input id="unmirror" type="checkbox" checked />
      Un-mirror camera
    </label>
  </div>

  <div class="kv">
    <div>WebSocket</div><div><span id="wsState">DISCONNECTED</span></div>
    <div>Last token</div><div><strong id="token">-</strong></div>
    <div>Confidence</div><div><span id="conf">-</span></div>
    <div>Latency (ms)</div><div><span id="lat">-</span></div>
    <div>Committed</div><div><span id="comm">-</span></div>
    <div>FPS (send)</div><div><span id="fps">-</span></div>
  </div>

  <div class="row">
    <div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" style="display:none"></canvas>
    </div>
    <div>
      <pre id="log"></pre>
    </div>
  </div>

<script>
(function () {
  const wsUrlInput = document.getElementById('wsUrl');
  const TARGET_FPS = 15;      // match training extraction FPS
  const JPEG_QUALITY = 0.7;   // 0..1
  const MAX_INFLIGHT = 1;     // prevent queue buildup

  const el = (id) => document.getElementById(id);
  const wsState = el('wsState');
  const tokenEl = el('token');
  const confEl = el('conf');
  const latEl = el('lat');
  const commEl = el('comm');
  const fpsEl = el('fps');
  const logEl = el('log');
  const video = el('video');
  const canvas = el('canvas');
  const btnStart = el('btnStart');
  const btnStop = el('btnStop');
  const btnUpload = el('btnUpload');
  const videoFile = el('videoFile');
  const uploadFps = el('uploadFps');
  const unmirror = el('unmirror');

  let ws = null;
  let stream = null;
  let timer = null;
  let inflight = 0;
  let sentFrames = 0;
  let lastFpsTs = performance.now();
  let lastNonNoSignToken = '-';
  let lastNonNoSignConf = 0;

  function log(line) {
    const ts = new Date().toISOString().split('T')[1].replace('Z','');
    logEl.textContent = `[${ts}] ${line}\n` + logEl.textContent;
  }

  function setWsState(s) {
    wsState.textContent = s;
  }

  function wsToHttpBase(wsUrl) {
    const u = new URL(wsUrl);
    const protocol = u.protocol === 'wss:' ? 'https:' : 'http:';
    return `${protocol}//${u.host}`;
  }

  async function start() {
    btnStart.disabled = true;
    btnStop.disabled = false;

    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
      video.srcObject = stream;
      await video.play();
      applyVideoTransform();

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      ws = new WebSocket(wsUrlInput.value);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        setWsState('CONNECTED');
        log('WebSocket connected');
      };

      ws.onclose = () => {
        setWsState('DISCONNECTED');
        log('WebSocket closed');
        stop();
      };

      ws.onerror = (e) => {
        setWsState('ERROR');
        log('WebSocket error');
      };

      ws.onmessage = (evt) => {
        inflight = Math.max(0, inflight - 1);
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'prediction') {
            const token = String(msg.token ?? 'NO_SIGN');
            const conf = Number(msg.confidence ?? 0);
            const vote = Number(msg.debug?.vote_ratio ?? 0);

            if (token !== 'NO_SIGN') {
              lastNonNoSignToken = token;
              lastNonNoSignConf = conf;
            }

            const shownToken =
              token === 'NO_SIGN'
                ? (lastNonNoSignToken === '-' ? 'NO_SIGN' : lastNonNoSignToken)
                : token;
            const shownConf =
              token === 'NO_SIGN'
                ? (lastNonNoSignToken === '-' ? conf : lastNonNoSignConf)
                : conf;

            tokenEl.textContent = shownToken;
            confEl.textContent = Number(shownConf).toFixed(3);
            latEl.textContent = String(msg.latency_ms ?? '-');
            commEl.textContent = String(!!msg.is_committed);
            const hands = !!msg.debug?.has_hands;
            const hr = Number(msg.debug?.window_hand_presence_ratio ?? 0);
            const mot = Number(msg.debug?.window_motion_score ?? 0);
            const gate = msg.debug?.live_gate_ok;
            log(`live=${token} (${conf.toFixed(3)}) vote=${vote.toFixed(2)} hands=${hands ? 1 : 0} hr=${hr.toFixed(2)} mot=${mot.toFixed(3)} gate=${gate === undefined ? '-' : (gate ? 1 : 0)}`);
            if (msg.is_committed) {
              log(`commit=${msg.token} conf=${(msg.confidence ?? 0).toFixed(3)} vote=${(msg.debug?.vote_ratio ?? 0).toFixed(2)}`);
            }
          } else if (msg.type === 'error') {
            log(`ERROR: ${msg.message}`);
          } else {
            log(`MSG: ${evt.data}`);
          }
        } catch {
          log(`RAW: ${evt.data}`);
        }
      };

      const intervalMs = Math.round(1000 / TARGET_FPS);
      timer = setInterval(captureAndSend, intervalMs);
    } catch (err) {
      log(`Failed to start: ${err}`);
      stop();
    }
  }

  function stop() {
    btnStart.disabled = false;
    btnStop.disabled = true;

    if (timer) {
      clearInterval(timer);
      timer = null;
    }

    if (ws) {
      try { ws.close(); } catch {}
      ws = null;
    }

    if (stream) {
      for (const t of stream.getTracks()) t.stop();
      stream = null;
    }

    setWsState('DISCONNECTED');
    inflight = 0;
  }

  async function uploadVideoTest() {
    const f = videoFile.files && videoFile.files[0];
    if (!f) {
      log('Pick a video file first.');
      return;
    }

    const sampleFps = Number(uploadFps.value || 15);
    const base = wsToHttpBase(wsUrlInput.value);
    const endpoint = `${base}/predict/video?sample_fps=${encodeURIComponent(sampleFps)}&max_frames=600`;

    const form = new FormData();
    form.append('file', f, f.name);

    btnUpload.disabled = true;
    try {
      log(`Uploading: ${f.name}`);
      const res = await fetch(endpoint, { method: 'POST', body: form });
      const text = await res.text();
      let data = null;
      try { data = JSON.parse(text); } catch { data = { raw: text }; }

      if (!res.ok) {
        log(`Upload test failed: HTTP ${res.status} ${JSON.stringify(data)}`);
        return;
      }

      tokenEl.textContent = data.committed_token || data.final_token || '-';
      confEl.textContent = Number(data.committed_confidence ?? data.final_confidence ?? 0).toFixed(3);
      const upToken = String(data.committed_token || data.final_token || 'NO_SIGN');
      const upConf = Number(data.committed_confidence ?? data.final_confidence ?? 0);
      if (upToken !== 'NO_SIGN') {
        lastNonNoSignToken = upToken;
        lastNonNoSignConf = upConf;
      } else {
        tokenEl.textContent = (lastNonNoSignToken === '-') ? 'NO_SIGN' : lastNonNoSignToken;
        confEl.textContent = Number((lastNonNoSignToken === '-') ? upConf : lastNonNoSignConf).toFixed(3);
      }
      latEl.textContent = '-';
      commEl.textContent = 'true';

      const inferredWindows = Number(data.inferred_windows ?? 0);
      const note = data.note ? ` note="${data.note}"` : '';
      log(
        `upload result: committed=${data.committed_token} (${Number(data.committed_confidence ?? 0).toFixed(3)}) ` +
        `final=${data.final_token} (${Number(data.final_confidence ?? 0).toFixed(3)}) ` +
        `sampled=${data.sampled_frames} windows=${inferredWindows}${note}`
      );
    } catch (e) {
      log(`Upload error: ${e}`);
    } finally {
      btnUpload.disabled = false;
    }
  }

  function captureAndSend() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (!video.videoWidth || !video.videoHeight) return;
    if (inflight >= MAX_INFLIGHT) return;

    const ctx = canvas.getContext('2d', { willReadFrequently: false });
    drawToCanvas(ctx);

    inflight += 1;
    canvas.toBlob(async (blob) => {
      try {
        if (!blob) { inflight = Math.max(0, inflight - 1); return; }
        const buf = await blob.arrayBuffer();
        ws.send(buf);

        sentFrames += 1;
        const now = performance.now();
        if (now - lastFpsTs >= 1000) {
          const fps = sentFrames / ((now - lastFpsTs) / 1000);
          fpsEl.textContent = fps.toFixed(1);
          sentFrames = 0;
          lastFpsTs = now;
        }
      } catch (e) {
        inflight = Math.max(0, inflight - 1);
        log(`Send failed: ${e}`);
      }
    }, 'image/jpeg', JPEG_QUALITY);
  }

  function applyVideoTransform() {
    video.style.transform = unmirror.checked ? 'scaleX(-1)' : 'none';
  }

  function drawToCanvas(ctx) {
    if (unmirror.checked) {
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();
      return;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  }

  btnStart.addEventListener('click', start);
  btnStop.addEventListener('click', stop);
  btnUpload.addEventListener('click', uploadVideoTest);
  unmirror.addEventListener('change', applyVideoTransform);
})();
</script>
</body>
</html>
