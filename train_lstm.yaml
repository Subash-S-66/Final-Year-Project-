# PHASE 7 - Baseline LSTM training config (CISLR)
# Run: C:/Users/subash/projects/collage/.venv/Scripts/python.exe -m training.train_lstm --config train_lstm.yaml

seed: 42

data:
  # Multiple dataset roots (CISLR + bridgeconn)
  roots:
    - data/processed/cislr
    - data/processed/bridgeconn
  vocab: configs/vocab_v1_51.json
  split:
    val_ratio: 0.20
    seed: 42

model:
  hidden_dim: 256
  num_layers: 2
  dropout: 0.2
  bidirectional: false

train:
  epochs: 50
  batch_size: 16
  lr: 0.0003
  weight_decay: 0.01
  patience: 10
  num_workers: 0   # Windows-safe

runtime:
  device: auto      # auto|cpu|cuda

outputs:
  checkpoints_dir: reports/checkpoints
  run_dir: reports/train_lstm_run
  log_csv: reports/train_lstm_log.csv
  curves_png: reports/train_lstm_curves.png
  confusion_png: reports/train_lstm_confusion.png
  metrics_json: reports/train_lstm_metrics.json
