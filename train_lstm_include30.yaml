seed: 42

data:
  roots:
    - data/processed/include30
  vocab: configs/vocab_include_30.json
  split:
    val_ratio: 0.20
    seed: 42
    min_train_per_label: 3
    min_val_per_label: 1

model:
  hidden_dim: 256
  num_layers: 2
  dropout: 0.2
  bidirectional: false

train:
  epochs: 80
  batch_size: 16
  lr: 0.0002
  weight_decay: 0.01
  label_smoothing: 0.05
  class_weight_power: 0.7
  grad_clip_norm: 1.0
  temperature_max_iter: 100
  use_weighted_sampler: true
  patience: 12
  num_workers: 0

augment:
  enabled: true
  jitter_std: 0.008
  jitter_prob: 0.8
  temporal_shift_max: 2
  temporal_shift_prob: 0.5
  speed_perturb_prob: 0.35
  speed_perturb_min: 0.90
  speed_perturb_max: 1.15
  frame_drop_prob: 0.25
  frame_drop_max: 2
  coord_dropout_prob: 0.30
  coord_dropout_ratio: 0.08

preprocess:
  enable_ema: true
  ema_alpha: 0.65
  per_frame_rms_norm: true
  per_sequence_zscore: true
  enable_delta: true
  clip_value: 6.0
  eps: 1.0e-5

runtime:
  device: auto

outputs:
  checkpoints_dir: reports/checkpoints_include30
  run_dir: reports/train_lstm_include30_run
  log_csv: reports/train_lstm_include30_log.csv
  curves_png: reports/train_lstm_include30_curves.png
  confusion_png: reports/train_lstm_include30_confusion.png
  metrics_json: reports/train_lstm_include30_metrics.json
  analysis_json: reports/train_lstm_include30_analysis.json
